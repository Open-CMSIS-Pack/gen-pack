name: publish_coverage

on:
  workflow_run:
    workflows: [gen_pack]
    types: [completed]

permissions:
  actions: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        contains(fromJSON('["pull_request","push","release","workflow_dispatch"]'), github.event.workflow_run.event)
      }}
    timeout-minutes: 5
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cov-xml
          path: coverage-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Install XML validation deps
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libxml2-utils

      - name: Validate coverage artifact
        shell: bash
        run: |
          set -euo pipefail

          cov_path=coverage-report/cov.xml
          size_limit_bytes=$((10 * 1024 * 1024))
          test -s "${cov_path}"

          if [ "$(wc -c < "${cov_path}")" -gt "${size_limit_bytes}" ]; then
            echo "${cov_path} exceeds the ${size_limit_bytes}-byte size limit" >&2
            exit 1
          fi

          if grep -Eiq '<!DOCTYPE|<!ENTITY' "${cov_path}"; then
            echo "${cov_path} contains unsupported XML declarations" >&2
            exit 1
          fi

          root_name=$(xmllint --nonet --xpath 'local-name(/*)' "${cov_path}")
          if [ "${root_name}" != "coverage" ]; then
            echo "${cov_path} is not a Cobertura coverage report: expected root element coverage, got ${root_name}" >&2
            exit 1
          fi

          line_rate=$(xmllint --nonet --xpath 'string(/*/@line-rate)' "${cov_path}")
          branch_rate=$(xmllint --nonet --xpath 'string(/*/@branch-rate)' "${cov_path}")
          lines_covered=$(xmllint --nonet --xpath 'string(/*/@lines-covered)' "${cov_path}")
          lines_valid=$(xmllint --nonet --xpath 'string(/*/@lines-valid)' "${cov_path}")

          python3 - "${line_rate}" "${branch_rate}" "${lines_covered}" "${lines_valid}" <<'PY'
          import sys

          for attr_name, value in zip(("line-rate", "branch-rate"), sys.argv[1:3]):
              try:
                  rate = float(value)
              except ValueError as exc:
                  raise SystemExit(f"{attr_name} must be numeric, got {value!r}") from exc
              if not 0.0 <= rate <= 1.0:
                  raise SystemExit(f"{attr_name} must be between 0.0 and 1.0, got {rate}")

          for attr_name, value in zip(("lines-covered", "lines-valid"), sys.argv[3:5]):
              try:
                  count = int(value)
              except ValueError as exc:
                  raise SystemExit(f"{attr_name} must be an integer, got {value!r}") from exc
              if count < 0:
                  raise SystemExit(f"{attr_name} must be zero or greater, got {count}")
          PY

      - name: Publish coverage report to QLTY
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage-report/cov.xml
          skip-errors: false
          format: cobertura
          verbose: true
